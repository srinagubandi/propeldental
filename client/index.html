<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="apple-touch-icon" href="/favicon.png">
    <link rel="manifest" href="/site.webmanifest">
    <title>Propel Dental - Performance-Based Growth for Dental Practices</title>
    <meta name="description" content="Propel Dental is the performance-based growth partner built exclusively for dentists, orthodontists, oral surgeons, and all dental specialists across the USA. Pay only for results." />

    <!-- PageSpeed fix: DNS prefetch + preconnect for Google Fonts -->
    <!-- preconnect establishes the TCP/TLS handshake early so font CSS arrives faster -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- PageSpeed fix: font-display=swap prevents invisible text during font load (FOIT) -->
    <!-- Using &display=swap means text renders immediately in fallback font, -->
    <!-- then swaps to the web font when it arrives — no FCP penalty from fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet" />

    <!-- PageSpeed fix: Critical above-the-fold CSS inlined -->
    <!-- This ensures the hero section renders without waiting for the CSS bundle -->
    <!-- Covers: dark background, basic typography, hero layout -->
    <style>
      /* Reset and base — prevents layout shift before CSS bundle loads */
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      html { font-size: 16px; -webkit-text-size-adjust: 100%; }
      body {
        background: #05070b;
        color: #ffffff;
        font-family: 'Inter', system-ui, -apple-system, sans-serif;
        line-height: 1.5;
        min-height: 100vh;
        overflow-x: hidden;
      }
      /* Root container — prevents CLS from unstyled flash */
      #root { min-height: 100vh; background: #05070b; }
      /* Hero section skeleton — matches final layout so no layout shift */
      .hero-section {
        position: relative;
        min-height: 100vh;
        display: flex;
        align-items: center;
        background: #05070b;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <!-- Analytics deferred — does not block rendering -->
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
